name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      changelog:
        description: 'Changelog for this release'
        required: false
        default: 'General bug fixes and improvements'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build
        run: ./gradlew build
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
      - name: Generate Changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git log --format="### %s%n%b" > CHANGELOG.md
          else
            git log ${LAST_TAG}..HEAD --format="### %s%n%b" > CHANGELOG.md
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG.md
          files: build/libs/*.jar
          generate_release_notes: false
      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: Release ${{ steps.get_version.outputs.version }}
          version: ${{ steps.get_version.outputs.version }}
          version-type: beta
          changelog-file: CHANGELOG.md
          loaders: fabric
          game-versions: |
            26.1.2
            26.2
          files: build/libs/!(*-sources).jar
